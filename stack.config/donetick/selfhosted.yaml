name: "Donetick"
is_done_tick_dot_com: false
# Edge authentication and Keycloak group policy gate this route. Native OIDC
# must be allowed to provision a user's Donetick record on first login.
is_user_creation_disabled: false
telegram:
  token: ""
pushover:
  token: ""
database:
  type: "sqlite"
  migration: true
jwt:
  secret: "{{DONETICK_JWT_SECRET}}"
  session_time: 168h
  max_refresh: 1440h
server:
  port: 2021
  read_timeout: 10s
  write_timeout: 10s
  rate_period: 60s
  rate_limit: 300
  serve_frontend: true
  serve_swagger: true
  public_host: ""
logging:
  level: "info"
  encoding: "json"
  development: false
scheduler_jobs:
  due_job: 30m
  overdue_job: 3h
  pre_due_job: 3h
email:
  host: ""
  port: 0
  key: ""
  email: ""
  user: ""
  appHost: ""
oauth2:
  client_id: "donetick"
  client_secret: "{{DONETICK_OAUTH_SECRET}}"
  redirect_url: "https://donetick.{{DOMAIN}}/auth/oauth2"
  auth_url: "https://keycloak.{{DOMAIN}}/realms/webservices/protocol/openid-connect/auth"
  token_url: "https://keycloak.{{DOMAIN}}/realms/webservices/protocol/openid-connect/token"
  user_info_url: "https://keycloak.{{DOMAIN}}/realms/webservices/protocol/openid-connect/userinfo"
  name: "Keycloak"
  scopes:
    - "openid"
    - "profile"
    - "email"
    - "groups"
realtime:
  enabled: true
  sse_enabled: true
  heartbeat_interval: 60s
  connection_timeout: 120s
  max_connections: 1000
  max_connections_per_user: 5
  event_queue_size: 2048
  cleanup_interval: 2m
  stale_threshold: 5m
  enable_compression: true
  enable_stats: true
  allowed_origins:
    - "*"
